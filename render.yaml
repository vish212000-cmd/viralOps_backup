services:
  # All-in-One Web Service (Free Tier)
  - type: web
    name: viralops-web
    env: python
    region: ohio
    plan: free
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "./start.sh"
    healthCheckPath: "/healthz/"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: viralops.settings.staging
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        sync: false # Set in dashboard
      - key: CELERY_BROKER_URL
        sync: false # Set in dashboard
      - key: SECRET_KEY
        generateValue: true
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: FRONTEND_URL
        sync: false # Set in dashboard
