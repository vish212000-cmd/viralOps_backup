global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'viralops-backend'
    metrics_path: '/prometheus/metrics'
    static_configs:
      - targets: ['backend:8000']
        labels:
          service: 'backend'
          environment: 'production'

  - job_name: 'viralops-prometheus'
    static_configs:
      - targets: ['localhost:9090']
